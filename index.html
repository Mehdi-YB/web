            background-color: #dfe4ea;

        .menu {
            width: 70%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* BOUTONS */
        .menu a {
            display: block;
            background-color: #f1f1f1;
            padding: 20px;
            border-radius: 18px;
            text-decoration: none;
            color: #3399ff;
            font-weight: bold;
            text-align: center;
            transition: 0.2s;

        .menu a:hover {

        }
