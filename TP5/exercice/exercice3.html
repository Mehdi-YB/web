<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice 3 - Calendrier</title>
    <link rel="stylesheet" href="../Style.css">

    <style>
        body {
            margin: 0;
            padding: 20px 15px 30px 15px;
            background-color: #eef2f7;
            color: #2c3e50;
            font-family: Arial, sans-serif;
        }

        .page {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .table-wrapper {
            background-color: #eef2f7;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .table-calendrier {
            border-collapse: separate;
            border-spacing: 6px;
            width: 100%;
            text-align: center;
        }

        .table-calendrier th,
        .table-calendrier td {
            border: 1px solid #bbb;
            padding: 10px;
        }

        /* Avril 2024 */
        .titre-mois {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }

        /* Jours semaine → gris */
        .jours-semaine th {
            background-color: #d6d6d6;
            color: #2c3e50;
            font-weight: bold;
        }

        /* Cases → clair */
        .table-calendrier td {
            background-color: #f8f8f8;
        }

        /* Cases vides */
        .case-vide {
            background-color: #ececec;
        }

        .menu-boutons {
            text-align: center;
            margin-top: 20px;
        }

        .bouton-lien {
            display: inline-block;
            padding: 10px 25px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }

        .bouton-lien:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="page">

        <h1>Exercice 3 : Calendrier</h1>

        <div class="table-wrapper">
            <table class="table-calendrier">
                <thead>
                    <tr>
                        <th colspan="7" class="titre-mois">Avril 2024</th>
                    </tr>
                    <tr class="jours-semaine">
                        <th>Lu</th>
                        <th>Ma</th>
                        <th>Me</th>
                        <th>Je</th>
                        <th>Ve</th>
                        <th>Sa</th>
                        <th>Di</th>
                    </tr>
                </thead>
                
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>2</td>
                        <td>3</td>
                        <td>4</td>
                        <td>5</td>
                        <td>6</td>
                        <td>7</td>
                    </tr>
                    <tr>
                        <td>8</td>
                        <td>9</td>
                        <td>10</td>
                        <td>11</td>
                        <td>12</td>
                        <td>13</td>
                        <td>14</td>
                    </tr>
                    <tr>
                        <td>15</td>
                        <td>16</td>
                        <td>17</td>
                        <td>18</td>
                        <td>19</td>
                        <td>20</td>
                        <td>21</td>
                    </tr>
                    <tr>
                        <td>22</td>
                        <td>23</td>
                        <td>24</td>
                        <td>25</td>
                        <td>26</td>
                        <td>27</td>
                        <td>28</td>
                    </tr>
                    <tr>
                        <td>29</td>
                        <td>30</td>
                        <td class="case-vide"></td>
                        <td class="case-vide"></td>
                        <td class="case-vide"></td>
                        <td class="case-vide"></td>
                        <td class="case-vide"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="menu-boutons">
            <a href="../TP5.html" class="bouton-lien">Retour au Menu</a>
        </div>

    </div>

</body>
</html>
